name: Đóng gói ứng dụng Windows (.EXE)

on:
  push:
    branches: [ "main", "master", "feature/haianh" ] # Thêm cả nhánh feature của bạn cho chắc
  pull_request:
    branches: [ "main", "master", "feature/haianh" ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
          cache-dependency-path: 'BTL/pom.xml' # Chỉ định đúng vị trí file pom để cache

      # BƯỚC SỬA 1: Thêm working-directory để Maven chui vào thư mục BTL
      - name: Build project với Maven
        working-directory: BTL
        run: mvn clean package

      # BƯỚC SỬA 2: Thêm working-directory để JPackage tìm đúng pom.xml
      - name: Đóng gói thành file cài đặt .EXE
        working-directory: BTL
        run: mvn jpackage:jpackage

      # BƯỚC SỬA 3: Sửa lại đường dẫn path trỏ vào đúng target của thư mục BTL
      - name: Tải file cài đặt lên GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BTL-Auction-Windows-Installer
          path: BTL/target/dist/*.exe