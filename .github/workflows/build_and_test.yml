name: Build and Test

on:
  push:
    branches: ["feature/haianh", "master"]
  pull_request:
    branches: ["feature/haianh", "master"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build and Test with Maven
        run: mvn -B test --file BTL/pom.xml
